    <style>
        :root {
            --pink: #b5179e;
            --purple: #7209b7;
            --bg: #00000000;
            --glow: 0 0 10px #b5179d7d, 0 0 20px #b5179d12, 0 0 30px #b5179e33;
        }

        p,
        a {
            font-family: "Share Tech Mono", "Courier New", monospace;
            color: #b5179e;
            font-weight: 1000;
            text-shadow: var(--glow);
        }

        h1,
        h2,
        h3,
        span {
            font-family: "Share Tech Mono", "Courier New", monospace;
            color: #b5179e;
            font-weight: 1000;
            text-shadow: var(--glow);
        }

        .nav a {
            color: #b5179e;
            /* custom font color */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .grid-item {
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            height: 300px;
            display: flex;
            flex-direction: row;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            /* square image area */
            overflow: hidden;
            border-radius: 8px;
            background: #11111100;
            /* optional background */
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* shows whole image */
        }

        .square {
            width: 300px;
            /* or 100%, or whatever */
            aspect-ratio: 1 / 1;
            /* height = width */
            overflow: hidden;
            /* prevents image spill */
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.7;
        }

        .slide {
            flex: 0 0 300px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .carousel-viewport {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            align-items: center;
            /* vertically center slides */
            padding-block: 20px;
            /* top & bottom padding */
            padding-inline: calc((100vw - 300px) / 2);
            /* dynamic left/right padding */
            scroll-padding-inline: calc((100vw - 300px) / 2);
            /* ensures snap considers padding */
            justify-content: center;

            /* critical fix: use padding, not extra spacer divs */
            padding-left: calc((100vw - 300px) / 2);
            /* half viewport - half slide */
            padding-right: calc((100vw - 300px) / 2);
            box-sizing: content-box;
            /* ensure padding doesn’t shrink content */
            scroll-padding-inline: calc((100vw - 300px) / 2);
            /* helps snap to center first/last */
        }

        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        ::-webkit-scrollbar {
            width: 14px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
            border-left: 1px solid var(--purple);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--purple);
            box-shadow: var(--glow);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--pink);
        }

        .text-glow {
            text-shadow: var(--glow);
        }

        .box-glow {
            box-shadow:
                0 0 10px #b5179e80,
                inset 0 0 10px #b5179e1a;
        }

        .border-glow {
            border: 1px solid var(--pink);
            box-shadow:
                0 0 10px #b5179e80,
                inset 0 0 20px #b5179e1a;
        }

        .logo {
            transition: all 0.3s ease;
        }

        .logo:hover {
            scale: 1.1;
        }

        .terminal-window {
            background: #00000086;
            border: 2px solid var(--pink);
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .terminal-window-top {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(90deg, transparent, #b5179e1a, transparent);
            border-bottom: 1px solid var(--pink);
            gap: 8px;
            padding: 8px 16px;
        }

        .terminal-header {
            background: rgba(74, 29, 29, 0.91);
            border-bottom: 1px solid var(--pink);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid var(--pink);
        }

        section,
        a,
        div,
        p,
        h1,
        h2,
        h3 {
            border: 1px solid #25abe000;
        }

        .expand2 {
            height: 40vh;
        }

        .desc {
            width: 50vw;
        }

        .spacer {
            flex: 0 0 calc((100vw - 300px) / 2);
            /* 300px = slide width */
        }

        /* hamburger hidden on desktop */
        .hamburger {
            display: none;
        }

        .rocket {
            display: inline;
        }

        .squarel {
            aspect-ratio: 1/1;
            height: 100px;

            padding: 0px;
            margin: 0px;
            display: flex;
            border-radius: 15px;
            background: #00000086;
            border: 2px solid var(--pink);
            box-shadow: var(--glow);

        }

        @media (max-width: 768px) {

            section,
            a,
            div,
            p,
            h1,
            h2,
            h3 {
                border: 1px solid rgba(255, 0, 0, 0);
            }

            .hamburger {
                display: inline;
            }

            section {
                overflow: hidden;
            }

            .rocket {
                display: none;
            }

            #header {
                flex-direction: row;
                gap: 1rem;
                padding: 1rem;
                border: 1px solid rgba(255, 0, 0, 0);
                align-items: flex-start;
                /* pushes icons to top of their container */
            }

            #header1 {
                display: flex !important;
                flex-direction: column;
                gap: 1rem;
            }

            .nav.active {

            }

            .nav {

                display: none !important;

                border: 1px solid rgba(255, 0, 0, 0);
            }

            .socials {
                display: flex;

            }

            .expand {

            }

            .expand2 {

            .terminal-window {

            .grid-container {

                        1fr) !important;

<script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 19;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#b5179eff");
        gradient.addColorStop(1, "#7209b7ff");
        ctx.fillStyle = gradient;
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }

            drops[i]++;
        }
    }

    setInterval(draw, 33);

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

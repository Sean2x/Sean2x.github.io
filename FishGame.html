<!doctype html>
<html lang="en">
  <head>
    <base target="_self" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Fish Avoiding Mouse</title>
    <meta
      name="description"
      content="The fish that run away from the mouse. It's a simple game where you control a mouse and try to catch the fish. The fish will try to avoid you, so you have to be quick and strategic to catch them all. It's a fun way to pass the time and challenge your reflexes."
    />
    <link rel="stylesheet" href="NewStyle.css" />

    <style>

        --Ocean: #242057;
        --Fish: #ff6347;
        --Shark: #3b3a47;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: var(--Ocean);
      }
      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <div id="version" style="font-size: 20px; color: white">v1.0</div>
    <canvas id="canvas"></canvas>

    <script src="FishGame.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
    <head>
    <base target="_self" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Lexicon</title>
    <meta
      name="description"
      content="This is my first web-Game, Lexicon. It's a word game where you have to make words out of a grid of letters. The longer the word, the more points you get. It's a fun way to improve your vocabulary and challenge yourself."
    />
    <link rel="stylesheet" href="NewStyle.css" />
    <body class="crt" style="background-color: #000000">
        <canvas id="matrixCanvas"></canvas>
<script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");
    const getVar = (name) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 19;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, .01)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, getVar("--lightMain"));
      gradient.addColorStop(1, getVar("--darkMain"));
      ctx.fillStyle = gradient;
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 33);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
    </body>
  
  
</html>
